# =============================================================================
# Docker Compose for Claude Code Container
# =============================================================================
# Usage:
#   docker compose up -d        # Start container in background
#   docker compose exec claude zsh  # Open shell in container
#   docker compose down         # Stop and remove container
#
# Configuration:
#   CONTAINER_USER - Username inside container (defaults to host $USER)
#   HOST_UID      - UID inside container (defaults to 1000; set to $(id -u) to mirror host)
#   HOST_GID      - GID inside container (defaults to 1000; set to $(id -g) to mirror host)
#   Set in .env file or export before running docker compose. Example:
#     export HOST_UID=$(id -u) HOST_GID=$(id -g)
# =============================================================================

# Default to the host user running docker compose; override with CONTAINER_USER
x-container-user: &container-user ${CONTAINER_USER:-${USER}}
x-container-home: &container-home /home/${CONTAINER_USER:-${USER}}
x-container-uid:  &container-uid  ${HOST_UID:-1000}
x-container-gid:  &container-gid  ${HOST_GID:-1000}

services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-UTC}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
        GO_VERSION: ${GO_VERSION:-1.23.5}
        USERNAME: *container-user
        USER_UID: *container-uid
        USER_GID: *container-gid
    
    container_name: claude-code
    hostname: claude-code
    
    # Interactive terminal
    stdin_open: true
    tty: true

    # Required to allow DBus notifications
    security_opt:
      - apparmor:unconfined
      
    # Security capabilities for firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # USB device access for YubiKey
    devices:
      - /dev/bus/usb:/dev/bus/usb
    
    # Map host.docker.internal to host gateway IP
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Environment variables
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/${CONTAINER_USER:-${USER}}/.claude
      - TZ=${TZ:-UTC}
      - HOME=/home/${CONTAINER_USER:-${USER}}
      - TERM=${TERM:-xterm-256color}

      # Get notifications
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/${HOST_UID:-1000}/bus
      - XDG_RUNTIME_DIR=/run/user/${HOST_UID:-1000}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}

      # Host port for accessing host services (e.g. dev servers)
      - HOST_PORT=${HOST_PORT:-}

      # Use emacsclient
      - EDITOR=emacs

    # Volume mounts
    volumes:
      # Your project workspace - PROJECT_ROOT and WORK_DIR set by sclaude function
      - ${PROJECT_ROOT}:${PROJECT_ROOT}
      - ${HOME}/git/root:${HOME}/git/root

      # Persist Claude configuration between container restarts
      - ${HOME}/.claude:/home/${CONTAINER_USER:-${USER}}/.claude

      # Persist command history
      - claude-history:/commandhistory

      # Optional: Mount your SSH keys for git operations (read-only)
      - ${HOME}/.ssh:/home/${CONTAINER_USER:-${USER}}/.ssh:ro

      # Optional: Mount your git config (read-only)
      - ${HOME}/.gitconfig:/home/${CONTAINER_USER:-${USER}}/.gitconfig:ro

      # Required for notifications
      - /run/user/${HOST_UID:-1000}:/run/user/${HOST_UID:-1000}

      # Share machine ID to prevent re-onboarding
      - /etc/machine-id:/etc/machine-id:ro
      - ${XDG_RUNTIME_DIR}/wayland-1:/run/user/${HOST_UID:-1000}/wayland-1

      # YubiKey: Share host pcscd socket for smart card operations (GPG, PIV)
      - /run/pcscd/pcscd.comm:/run/pcscd/pcscd.comm

      # Persist Claude Code installation between container rebuilds
      - claude-local:/home/${CONTAINER_USER:-${USER}}/.local

    # Working directory - set by sclaude function (defaults to PROJECT_ROOT)
    working_dir: ${WORK_DIR:-${PROJECT_ROOT}}

    userns_mode: host
    
    # Keep container running
    # command: sleep infinity
    
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

# Named volumes for persistence
volumes:
#  claude-config:
#    name: claude-code-config
  claude-history:
    name: claude-code-history
  claude-local:
    name: claude-code-local
